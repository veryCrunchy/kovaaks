[Overrides]
; Path to the 'Mods' folder.
ModsFolderPath =

[General]
; Development profile: keep hot reload/tooling enabled.
EnableHotReloadSystem = 1
UseCache = 1
InvalidateCacheIfDLLDiffers = 1
SecondsToScanBeforeGivingUp = 120
bUseUObjectArrayCache = true

[EngineVersionOverride]
MajorVersion = 4
; KovaaK's behaves more reliably under UE4SS with 4.27 override.
; (4.26 has shown startup crashes in this project.)
MinorVersion = 27

[ObjectDumper]
LoadAllAssetsBeforeDumpingObjects = 0

[CXXHeaderGenerator]
DumpOffsetsAndSizes = 1
KeepMemoryLayout = 0
LoadAllAssetsBeforeGeneratingCXXHeaders = 0

[UHTHeaderGenerator]
IgnoreAllCoreEngineModules = 0
IgnoreEngineAndCoreUObject = 0
MakeAllFunctionsBlueprintCallable = 1
MakeAllPropertyBlueprintsReadWrite = 1
MakeEnumClassesBlueprintType = 1
MakeAllConfigsEngineConfig = 1

[Debug]
ConsoleEnabled = 1
GuiConsoleEnabled = 1
GuiConsoleVisible = 1
GuiConsoleFontScaling = 1
GraphicsAPI = dx11
LiveViewObjectsPerGroup = 32768

[Threads]
SigScannerNumThreads = 1
SigScannerMultithreadingModuleSizeThreshold = 16777216

[Memory]
MaxMemoryUsageDuringAssetLoading = 85

[Hooks]
HookProcessInternal =0
HookProcessLocalScriptFunction =0
HookInitGameState =1
HookLoadMap =1
HookCallFunctionByNameWithArguments =1
HookBeginPlay  =1
HookEndPlay  =1
HookLocalPlayerExec =1
HookAActorTick =1
HookEngineTick =1
; Method for resolving GameEngine::Tick address
; Valid values (case-insensitive): Scan, VTable
; Scan: Use PatternSleuth AOB scan (fallback to VTable if scan fails)
; VTable: Use vtable lookup (fallback to Scan if vtable lookup fails)
; Default: Scan
EngineTickResolveMethod = Scan
HookGameViewportClientTick =1
; Legacy keys below are ignored by this UE4SS branch:
; HookUObjectProcessEvent
; HookProcessConsoleExec
; HookUStructLink
FExecVTableOffsetInLocalPlayer = 0x28

[CrashDump]
EnableDumping = 1
FullMemoryDump = 0

[ExperimentalFeatures]
GUIUFunctionCaller = 1

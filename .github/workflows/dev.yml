name: Dev Build

on:
  push:
    branches: [main]

jobs:
  dev-build:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Rust build cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Cache UE4SS template/submodules
        uses: actions/cache@v4
        with:
          path: external/UE4SSCPPTemplate
          key: ${{ runner.os }}-ue4ss-template-${{ hashFiles('scripts/dev-pipeline.ps1', 'scripts/dev-pipeline.sh') }}

      - name: Cache payload pipeline artifacts
        uses: actions/cache@v4
        with:
          path: |
            .cache/pipeline
            .cache/ue4ss-runtime
          key: ${{ runner.os }}-payload-pipeline-${{ hashFiles('scripts/dev-pipeline.ps1', 'scripts/sync-ue4ss-payload.ps1') }}
          restore-keys: |
            ${{ runner.os }}-payload-pipeline-

      - name: Install frontend dependencies
        run: pnpm install

      - name: Compute prerelease tags
        id: prerelease_meta
        shell: pwsh
        run: |
          $tauriConfig = Get-Content "src-tauri/tauri.conf.json" -Raw | ConvertFrom-Json
          $baseVersion = [string]$tauriConfig.version
          if ([string]::IsNullOrWhiteSpace($baseVersion)) {
            throw "Could not read version from src-tauri/tauri.conf.json"
          }

          $preVersion = "$baseVersion-pre.${{ github.run_number }}.${{ github.run_attempt }}"
          $preTag = "v$preVersion"
          $tauriConfigOverridePath = Join-Path $env:RUNNER_TEMP "tauri-prerelease-config.json"

          @{ version = $preVersion } |
            ConvertTo-Json -Compress |
            Set-Content -Path $tauriConfigOverridePath -Encoding utf8NoBOM

          "base_version=$baseVersion" >> $env:GITHUB_OUTPUT
          "pre_version=$preVersion" >> $env:GITHUB_OUTPUT
          "pre_tag=$preTag" >> $env:GITHUB_OUTPUT
          "tauri_config_override=$tauriConfigOverridePath" >> $env:GITHUB_OUTPUT

      - name: Stage stripped production AimMod runtime payload
        shell: pwsh
        env:
          UE4SS_GITHUB_TOKEN: ${{ secrets.UE4SS_GITHUB_TOKEN }}
        run: |
          ./scripts/dev-pipeline.ps1 -Configuration Release -ModConfiguration Release -RuntimeProfile minimal -SettingsProfile production -StrippedModBuild true -SkipFrontendInstall -SkipOverlayBuild

      - name: Verify staged stripped production AimMod runtime payload
        shell: pwsh
        run: |
          $builtRustCore = "ue4ss-rust-core/target/x86_64-pc-windows-msvc/release/ue4ss_rust_core.dll"
          $requiredFiles = @(
            "src-tauri/ue4ss/kovaaks_rust_core.dll",
            "src-tauri/ue4ss/Mods/KovaaksBridgeMod/mod.json",
            "src-tauri/ue4ss/Mods/KovaaksBridgeMod/dlls/main.dll"
          )

          foreach ($path in $requiredFiles) {
            if (-not (Test-Path $path -PathType Leaf)) {
              throw "Missing staged prod payload file: $path"
            }
          }

          $runtimeDll = Get-ChildItem "src-tauri/ue4ss" -File -Filter "*.dll" |
            Where-Object { $_.Name -ne "kovaaks_rust_core.dll" } |
            Select-Object -First 1
          if (-not $runtimeDll) {
            throw "Missing staged runtime DLL in src-tauri/ue4ss"
          }

          $runtimeIni = Get-ChildItem "src-tauri/ue4ss" -File -Filter "*settings.ini" | Select-Object -First 1
          if (-not $runtimeIni) {
            throw "Missing staged runtime settings file in src-tauri/ue4ss"
          }

          $runtimeProfile = (Get-Content "src-tauri/ue4ss/.kovaaks_overlay_profile" -Raw).Trim()
          if ($runtimeProfile -ne "minimal") {
            throw "Expected runtime profile 'minimal' but found '$runtimeProfile'."
          }

          $settingsProfile = (Get-Content "src-tauri/ue4ss/.kovaaks_overlay_settings_profile" -Raw).Trim()
          if ($settingsProfile -ne "production") {
            throw "Expected settings profile 'production' but found '$settingsProfile'."
          }

          if (-not (Test-Path $builtRustCore -PathType Leaf)) {
            throw "Missing built rust core DLL: $builtRustCore"
          }

          $builtRustCoreHash = (Get-FileHash $builtRustCore -Algorithm SHA256).Hash.ToLowerInvariant()
          $stagedRustCoreHash = (Get-FileHash "src-tauri/ue4ss/kovaaks_rust_core.dll" -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($builtRustCoreHash -ne $stagedRustCoreHash) {
            throw "Staged kovaaks_rust_core.dll does not match the freshly built rust core DLL."
          }

          Write-Host "==> Staged prod payload hashes"
          Get-FileHash "src-tauri/ue4ss/kovaaks_rust_core.dll" -Algorithm SHA256 | ForEach-Object {
            Write-Host "kovaaks_rust_core.dll sha256: $($_.Hash.ToLowerInvariant())"
          }
          Get-FileHash "src-tauri/ue4ss/Mods/KovaaksBridgeMod/dlls/main.dll" -Algorithm SHA256 | ForEach-Object {
            Write-Host "main.dll sha256: $($_.Hash.ToLowerInvariant())"
          }
          Get-FileHash $runtimeDll.FullName -Algorithm SHA256 | ForEach-Object {
            Write-Host "$($runtimeDll.Name) sha256: $($_.Hash.ToLowerInvariant())"
          }

      - name: Ensure GitHub pre-release exists
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tagName = "${{ steps.prerelease_meta.outputs.pre_tag }}"
          $releaseName = "AimMod $tagName"

          gh release view $tagName *> $null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release $tagName already exists."
            exit 0
          }

          Write-Host "Release $tagName does not exist yet. Creating it explicitly before tauri-action upload."
          gh release create $tagName --prerelease --title $releaseName --notes ""

      - name: Build and publish prod-on-main pre-release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AIMMOD_DISPLAY_VERSION: ${{ steps.prerelease_meta.outputs.pre_tag }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.prerelease_meta.outputs.pre_tag }}
          releaseName: "AimMod ${{ steps.prerelease_meta.outputs.pre_tag }}"
          releaseDraft: false
          prerelease: true
          generateReleaseNotes: false
          # Do not overwrite the stable updater JSON with main pre-releases
          includeUpdaterJson: false
          assetNamePattern: '[name]-[version]-[platform]-[arch][setup][ext]'
          args: --target x86_64-pc-windows-msvc --config "${{ steps.prerelease_meta.outputs.tauri_config_override }}"

      - name: Log built prod bundle hashes
        shell: pwsh
        run: |
          $bundleRoot = "src-tauri/target/x86_64-pc-windows-msvc/release/bundle"
          if (Test-Path $bundleRoot) {
            Write-Host "==> Built prod bundle artifact hashes"
            Get-ChildItem $bundleRoot -Recurse -File | Sort-Object FullName | ForEach-Object {
              $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
              Write-Host "$($_.FullName) sha256: $hash"
            }
          }

      - name: Stage development-profile AimMod runtime payload
        shell: pwsh
        env:
          UE4SS_GITHUB_TOKEN: ${{ secrets.UE4SS_GITHUB_TOKEN }}
        run: |
          ./scripts/dev-pipeline.ps1 -Configuration Release -ModConfiguration Release -RuntimeProfile minimal -SettingsProfile development -StrippedModBuild false -SkipFrontendInstall -SkipOverlayBuild

      - name: Verify staged development-profile AimMod runtime payload
        shell: pwsh
        run: |
          $builtRustCore = "ue4ss-rust-core/target/x86_64-pc-windows-msvc/release/ue4ss_rust_core.dll"
          $requiredFiles = @(
            "src-tauri/ue4ss/kovaaks_rust_core.dll",
            "src-tauri/ue4ss/Mods/KovaaksBridgeMod/mod.json",
            "src-tauri/ue4ss/Mods/KovaaksBridgeMod/dlls/main.dll"
          )

          foreach ($path in $requiredFiles) {
            if (-not (Test-Path $path -PathType Leaf)) {
              throw "Missing staged dev payload file: $path"
            }
          }

          $runtimeDll = Get-ChildItem "src-tauri/ue4ss" -File -Filter "*.dll" |
            Where-Object { $_.Name -ne "kovaaks_rust_core.dll" } |
            Select-Object -First 1
          if (-not $runtimeDll) {
            throw "Missing staged runtime DLL in src-tauri/ue4ss"
          }

          $runtimeIni = Get-ChildItem "src-tauri/ue4ss" -File -Filter "*settings.ini" | Select-Object -First 1
          if (-not $runtimeIni) {
            throw "Missing staged runtime settings file in src-tauri/ue4ss"
          }

          $runtimeProfile = (Get-Content "src-tauri/ue4ss/.kovaaks_overlay_profile" -Raw).Trim()
          if ($runtimeProfile -ne "minimal") {
            throw "Expected runtime profile 'minimal' but found '$runtimeProfile'."
          }

          $settingsProfile = (Get-Content "src-tauri/ue4ss/.kovaaks_overlay_settings_profile" -Raw).Trim()
          if ($settingsProfile -ne "development") {
            throw "Expected settings profile 'development' but found '$settingsProfile'."
          }

          if (-not (Test-Path $builtRustCore -PathType Leaf)) {
            throw "Missing built rust core DLL: $builtRustCore"
          }

          $builtRustCoreHash = (Get-FileHash $builtRustCore -Algorithm SHA256).Hash.ToLowerInvariant()
          $stagedRustCoreHash = (Get-FileHash "src-tauri/ue4ss/kovaaks_rust_core.dll" -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($builtRustCoreHash -ne $stagedRustCoreHash) {
            throw "Staged kovaaks_rust_core.dll does not match the freshly built rust core DLL."
          }

          Write-Host "==> Staged dev payload hashes"
          Get-FileHash "src-tauri/ue4ss/kovaaks_rust_core.dll" -Algorithm SHA256 | ForEach-Object {
            Write-Host "kovaaks_rust_core.dll sha256: $($_.Hash.ToLowerInvariant())"
          }
          Get-FileHash "src-tauri/ue4ss/Mods/KovaaksBridgeMod/dlls/main.dll" -Algorithm SHA256 | ForEach-Object {
            Write-Host "main.dll sha256: $($_.Hash.ToLowerInvariant())"
          }
          Get-FileHash $runtimeDll.FullName -Algorithm SHA256 | ForEach-Object {
            Write-Host "$($runtimeDll.Name) sha256: $($_.Hash.ToLowerInvariant())"
          }

      - name: Build and publish dev pre-release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AIMMOD_DISPLAY_VERSION: ${{ steps.prerelease_meta.outputs.pre_tag }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.prerelease_meta.outputs.pre_tag }}
          releaseName: "AimMod ${{ steps.prerelease_meta.outputs.pre_tag }}"
          releaseDraft: false
          prerelease: true
          generateReleaseNotes: true
          # Do not overwrite the stable updater JSON with dev builds
          includeUpdaterJson: false
          assetNamePattern: '[name]-debug-[version]-[platform]-[arch][setup][ext]'
          args: --target x86_64-pc-windows-msvc --config "${{ steps.prerelease_meta.outputs.tauri_config_override }}"

      - name: Log built dev bundle hashes
        shell: pwsh
        run: |
          $bundleRoot = "src-tauri/target/x86_64-pc-windows-msvc/release/bundle"
          if (Test-Path $bundleRoot) {
            Write-Host "==> Built dev bundle artifact hashes"
            Get-ChildItem $bundleRoot -Recurse -File | Sort-Object FullName | ForEach-Object {
              $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
              Write-Host "$($_.FullName) sha256: $hash"
            }
          }

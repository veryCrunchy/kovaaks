name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Rust build cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Cache UE4SS template/submodules
        uses: actions/cache@v4
        with:
          path: external/UE4SSCPPTemplate
          key: ${{ runner.os }}-ue4ss-template-${{ hashFiles('scripts/dev-pipeline.ps1', 'scripts/dev-pipeline.sh') }}

      - name: Cache payload pipeline artifacts
        uses: actions/cache@v4
        with:
          path: |
            .cache/pipeline
            .cache/ue4ss-runtime
          key: ${{ runner.os }}-payload-pipeline-${{ hashFiles('scripts/dev-pipeline.ps1', 'scripts/sync-ue4ss-payload.ps1') }}
          restore-keys: |
            ${{ runner.os }}-payload-pipeline-

      - name: Install frontend dependencies
        run: pnpm install

      - name: Stage stripped production AimMod runtime payload
        shell: pwsh
        env:
          UE4SS_GITHUB_TOKEN: ${{ secrets.UE4SS_GITHUB_TOKEN }}
        run: |
          ./scripts/dev-pipeline.ps1 `
            -Configuration Release `
            -ModConfiguration Release `
            -RuntimeProfile minimal `
            -SettingsProfile production `
            -StrippedModBuild $true `
            -SkipFrontendInstall `
            -SkipOverlayBuild

      - name: Verify staged AimMod runtime payload
        shell: pwsh
        run: |
          $builtRustCore = "ue4ss-rust-core/target/x86_64-pc-windows-msvc/release/ue4ss_rust_core.dll"
          $requiredFiles = @(
            "src-tauri/ue4ss/kovaaks_rust_core.dll",
            "src-tauri/ue4ss/Mods/KovaaksBridgeMod/mod.json",
            "src-tauri/ue4ss/Mods/KovaaksBridgeMod/dlls/main.dll"
          )

          foreach ($path in $requiredFiles) {
            if (-not (Test-Path $path -PathType Leaf)) {
              throw "Missing staged release payload file: $path"
            }
          }

          $runtimeDll = Get-ChildItem "src-tauri/ue4ss" -File -Filter "*.dll" |
            Where-Object { $_.Name -ne "kovaaks_rust_core.dll" } |
            Select-Object -First 1
          if (-not $runtimeDll) {
            throw "Missing staged runtime DLL in src-tauri/ue4ss"
          }

          $runtimeIni = Get-ChildItem "src-tauri/ue4ss" -File -Filter "*settings.ini" | Select-Object -First 1
          if (-not $runtimeIni) {
            throw "Missing staged runtime settings file in src-tauri/ue4ss"
          }

          $runtimeProfile = (Get-Content "src-tauri/ue4ss/.kovaaks_overlay_profile" -Raw).Trim()
          if ($runtimeProfile -ne "minimal") {
            throw "Expected runtime profile 'minimal' but found '$runtimeProfile'."
          }

          $settingsProfile = (Get-Content "src-tauri/ue4ss/.kovaaks_overlay_settings_profile" -Raw).Trim()
          if ($settingsProfile -ne "production") {
            throw "Expected settings profile 'production' but found '$settingsProfile'."
          }

          if (-not (Test-Path $builtRustCore -PathType Leaf)) {
            throw "Missing built rust core DLL: $builtRustCore"
          }

          $builtRustCoreHash = (Get-FileHash $builtRustCore -Algorithm SHA256).Hash.ToLowerInvariant()
          $stagedRustCoreHash = (Get-FileHash "src-tauri/ue4ss/kovaaks_rust_core.dll" -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($builtRustCoreHash -ne $stagedRustCoreHash) {
            throw "Staged kovaaks_rust_core.dll does not match the freshly built rust core DLL."
          }

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ inputs.tag_name || github.ref_name }}
          releaseName: "AimMod ${{ inputs.tag_name || github.ref_name }}"
          # release-please already created the release with a changelog;
          # tauri-action will find it by tag and upload the build artifacts.
          releaseDraft: false
          prerelease: false
          args: --target x86_64-pc-windows-msvc
          updaterJsonPreferNsis: true
